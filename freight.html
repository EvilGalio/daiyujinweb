<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freight Calculator — Daiyujin Precision</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/plugins.css">
</head>

<body class="tool-page">
    <div class="tool-shell">
        <nav class="tool-nav">
            <a href="index.html" class="tool-nav-brand"><span></span> Daiyujin Precision</a>
            <div class="tool-nav-links">
                <a href="index.html">Home</a>
                <a href="quote.html">Quote</a>
                <a href="freight.html" aria-current="page">Freight</a>
                <a href="tolerance.html">Tolerance</a>
                <a href="about.html">About</a>
            </div>
        </nav>

        <main>
            <section class="tool-hero">
                <div>
                    <h1>Freight Estimate</h1>
                    <p>DHL rates from China to over 230 destinations worldwide.</p>
                </div>
                <div class="tool-status" data-api-status>checking</div>
            </section>

            <section class="tool-grid">
                <form class="tool-panel tool-form" data-freight-form autocomplete="off">
                    <h2>Shipment</h2>
                    <div class="tool-field country-search" data-country-search>
                        <label for="country">Destination</label>
                        <input id="country" name="country" type="text" placeholder="Search country&hellip;" autocomplete="off" required>
                        <div class="country-dropdown" data-country-dropdown></div>
                    </div>
                    <div class="tool-field">
                        <label for="weight">Cargo Weight (kg)</label>
                        <input id="weight" name="weight" type="number" min="0.5" step="0.5" value="5" required>
                    </div>
                    <div class="tool-field">
                        <label for="currency">Display Currency</label>
                        <select id="currency" name="currency">
                            <option value="CNY">CNY</option>
                            <option value="USD" selected>USD</option>
                            <option value="EUR">EUR</option>
                        </select>
                    </div>
                    <button class="tool-button" type="submit">Get Estimate</button>
                </form>

                <aside class="tool-panel" data-result-panel>
                    <h2>DHL Freight</h2>
                    <div class="dhl-result" data-freight-result data-state="idle">
                        <div class="dhl-result-main">
                            <div class="dhl-result-amount">USD $0.00</div>
                            <div class="dhl-result-meta">Ready for estimate</div>
                        </div>
                        <div class="freight-progress" data-progress-bar hidden>
                            <div class="freight-progress-bar">
                                <div class="freight-progress-fill" data-progress-fill></div>
                            </div>
                            <div class="freight-progress-text">
                                <span class="freight-progress-phase" data-progress-phase></span>
                                <span class="freight-progress-pct" data-progress-pct>0%</span>
                            </div>
                        </div>
                    </div>
                </aside>
            </section>
        </main>

        <footer>&copy; 2025 Daiyujin. All rights reserved.</footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/freight.js"></script>
</body>

</html>
