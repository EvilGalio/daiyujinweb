<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freight Calculator — Daiyujin Precision</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/plugins.css">
</head>

<body class="tool-page">
    <div class="tool-shell">
        <nav class="tool-nav">
            <a href="index.html" class="tool-nav-brand"><span></span> Daiyujin Precision</a>
            <div class="tool-nav-links">
                <a href="index.html">Home</a>
                <a href="quote.html">Quote</a>
                <a href="freight.html" aria-current="page">Freight</a>
                <a href="tolerance.html">Tolerance</a>
                <a href="about.html">About</a>
            </div>
        </nav>

        <main>
            <section class="tool-hero">
                <div>
                    <h1>Freight Estimate</h1>
                    <p>Compare DHL and FedEx rates from China to over 230 destinations worldwide.</p>
                </div>
                <div class="tool-status" data-api-status>checking</div>
            </section>

            <section class="tool-grid">
                <form class="tool-panel tool-form" data-freight-form>
                    <h2>Shipment</h2>
                    <div class="tool-field">
                        <label for="country">Destination</label>
                        <input id="country" name="country" type="text" list="countries" placeholder="Germany" autocomplete="off" required>
                        <datalist id="countries" data-country-list>
                            <option value="Germany"></option>
                            <option value="Japan"></option>
                            <option value="United States"></option>
                            <option value="Hong Kong"></option>
                        </datalist>
                    </div>
                    <div class="tool-field">
                        <label for="weight">Weight (kg)</label>
                        <input id="weight" name="weight" type="number" min="0.5" step="0.5" value="5" required>
                    </div>
                    <div class="tool-field">
                        <span class="tool-label">Carrier</span>
                        <div class="tool-checks">
                            <label><input type="checkbox" name="carrier" value="DHL" checked> DHL</label>
                            <label><input type="checkbox" name="carrier" value="FedEx" checked> FedEx</label>
                        </div>
                    </div>
                    <div class="tool-field">
                        <label for="currency">Display Currency</label>
                        <select id="currency" name="currency">
                            <option value="CNY">CNY</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                        </select>
                    </div>
                    <button class="tool-button" type="submit">Get Rates</button>
                </form>

                <aside class="tool-panel">
                    <h2>Rates</h2>
                    <div class="tool-result" data-freight-result>
                        <div class="tool-note">Enter destination and weight to compare.</div>
                    </div>
                </aside>
            </section>
        </main>

        <footer>&copy; 2025 Daiyujin. All rights reserved.</footer>
    </div>

    <script>window.DAIYUJIN_API_BASE = "http://127.0.0.1:5000";</script>
    <script src="js/api.js"></script>
    <script src="js/freight.js"></script>
</body>

</html>
