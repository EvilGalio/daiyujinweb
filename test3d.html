<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Preview — Daiyujin Test</title>
<style>
  :root {
    --bg: #e8e8ed;
    --surface: #f5f5f7;
    --ink: #1d1d1f;
    --muted: #86868b;
    --line: rgba(0,0,0,.08);
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex; flex-direction: column; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: rgba(245,245,247,.85);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line);
    z-index: 10; position: relative;
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  header span { font-size: 13px; color: var(--muted); }

  .viewer-wrap {
    flex: 1; position: relative;
    background: radial-gradient(ellipse at 50% 40%, #f0f0f5 0%, #e0e0e6 60%, #d4d4db 100%);
  }
  #three-canvas { display: block; }

  /* File drop zone — covers viewer when no model */
  .drop-zone {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 5; pointer-events: none; opacity: 1; transition: opacity .5s;
  }
  .drop-zone.hidden { opacity: 0; pointer-events: none; }
  .drop-zone-box {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    padding: 48px 64px;
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    border: 1.5px dashed rgba(0,0,0,.12);
    pointer-events: auto;
  }
  .drop-zone-box svg { color: var(--muted); }
  .drop-zone-box p { font-size: 15px; font-weight: 500; color: var(--ink); margin: 0; }
  .drop-zone-box small { font-size: 12px; color: var(--muted); }

  .drop-zone-box button {
    border: none;
    background: var(--ink);
    color: #fff;
    border-radius: 16px;
    padding: 10px 28px;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s;
  }
  .drop-zone-box button:hover { opacity: .85; }
  .drop-zone-box button:disabled { opacity: .4; cursor: default; }

  /* Status bar */
  .status-bar {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(12px);
    border-radius: 20px; padding: 6px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    z-index: 10;
  }
  .status-bar button {
    border: none; background: transparent; border-radius: 16px;
    padding: 8px 18px; font-size: 13px; font-weight: 500;
    color: var(--ink); cursor: pointer; font-family: inherit;
    transition: background .15s;
  }
  .status-bar button:hover { background: rgba(0,0,0,.05); }
  .status-bar button.active { background: rgba(0,0,0,.08); }

  .hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 14px; color: var(--muted); pointer-events: none;
    opacity: 1; transition: opacity .6s; z-index: 6;
  }
  .hint.fade { opacity: 0; }

  .info-bar {
    position: absolute; top: 16px; right: 24px;
    font-size: 12px; color: var(--muted); text-align: right;
    line-height: 1.6; z-index: 6;
  }

  .loading-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    z-index: 8; pointer-events: none; opacity: 0; transition: opacity .3s;
  }
  .loading-overlay.show { opacity: 1; }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(0,0,0,.1);
    border-top-color: rgba(0,0,0,.4);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>3D Preview</h1>
  <span>Daiyujin Precision</span>
</header>

<div class="viewer-wrap" id="viewer">
  <canvas id="three-canvas"></canvas>

  <div class="drop-zone" id="drop-zone">
    <div class="drop-zone-box">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Drop STEP file here</p>
      <small>.stp / .step &middot; max 50 MB</small>
      <button id="btn-upload">Choose File</button>
      <input type="file" id="file-input" accept=".stp,.step" hidden>
    </div>
  </div>

  <div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>
  <div class="hint" id="hint">Drag to rotate &middot; Scroll to zoom</div>
  <div class="info-bar" id="info"></div>

  <div class="status-bar">
    <button data-view="iso" class="active">Isometric</button>
    <button data-view="front">Front</button>
    <button data-view="top">Top</button>
    <button data-view="right">Right</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="js/config.js"></script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

/* ── DOM refs ── */
const container = document.getElementById('viewer');
const canvas = document.getElementById('three-canvas');
const dropZone = document.getElementById('drop-zone');
const hintEl = document.getElementById('hint');
const infoEl = document.getElementById('info');
const loadingEl = document.getElementById('loading');
const fileInput = document.getElementById('file-input');
const btnUpload = document.getElementById('btn-upload');

/* ── Renderer ── */
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, container.clientWidth / container.clientHeight, 0.5, 5000);
camera.position.set(18, 12, 22);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 500;
controls.maxPolarAngle = Math.PI * 0.75;
controls.update();

/* ── Lighting ── */
scene.add(new THREE.AmbientLight('#c8cdd3', 1.6));

const key = new THREE.DirectionalLight('#ffffff', 3.2);
key.position.set(15, 20, 10);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5; key.shadow.camera.far = 200;
key.shadow.camera.left = -20; key.shadow.camera.right = 20;
key.shadow.camera.top = 20; key.shadow.camera.bottom = -20;
key.shadow.bias = -0.0001;
key.shadow.normalBias = 0.02;
scene.add(key);

scene.add(new THREE.DirectionalLight('#b8c4d4', 1.2).translateX(-10).translateY(5).translateZ(-5));
scene.add(new THREE.DirectionalLight('#ffffff', 1.0).translateY(-2).translateZ(-15));

/* ── Ground ── */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: '#e0e0e5', roughness: 0.9, metalness: 0 }),
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -5.5;
ground.receiveShadow = true;
scene.add(ground);

/* ── Model group ── */
const modelGroup = new THREE.Group();
scene.add(modelGroup);

const modelMaterial = new THREE.MeshStandardMaterial({ color: '#8a929b', roughness: 0.35, metalness: 0.7 });

/* ── Cam views ── */
const views = {};
function updateViews() {
  const box = new THREE.Box3().setFromObject(modelGroup);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(s.x, s.y, s.z, 0.5);

  /* Camera distance for ~1/3 viewport fill */
  const fovRad = camera.fov * Math.PI / 360;
  const d = maxDim * 0.5 / Math.tan(fovRad); /* fills full height */
  const dist = d * 2.8; /* ~1/3 fill */

  views.iso   = { pos: [c.x + dist*.7, c.y + dist*.5, c.z + dist*.9], target: [c.x, c.y, c.z] };
  views.front = { pos: [c.x, c.y, c.z + dist], target: [c.x, c.y, c.z] };
  views.top   = { pos: [c.x, c.y + dist, c.z + 0.01], target: [c.x, c.y, c.z] };
  views.right = { pos: [c.x + dist, c.y, c.z], target: [c.x, c.y, c.z] };

  /* Adapt shadow camera to model size */
  const shadowPad = maxDim * 0.6;
  key.shadow.camera.left   = c.x - shadowPad;
  key.shadow.camera.right  = c.x + shadowPad;
  key.shadow.camera.top    = c.y + shadowPad;
  key.shadow.camera.bottom = c.y - shadowPad;
  key.shadow.camera.far    = dist * 3;
  key.shadow.camera.updateProjectionMatrix();
}

function animateCamera(posArr, targetArr) {
  const s = { px: camera.position.x, py: camera.position.y, pz: camera.position.z, tx: controls.target.x, ty: controls.target.y, tz: controls.target.z };
  const e = { px: posArr[0], py: posArr[1], pz: posArr[2], tx: targetArr[0], ty: targetArr[1], tz: targetArr[2] };
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / 600, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    camera.position.set(s.px+(e.px-s.px)*ease, s.py+(e.py-s.py)*ease, s.pz+(e.pz-s.pz)*ease);
    controls.target.set(s.tx+(e.tx-s.tx)*ease, s.ty+(e.ty-s.ty)*ease, s.tz+(e.tz-s.tz)*ease);
    controls.update();
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = views[btn.dataset.view];
    if (v) animateCamera(v.pos, v.target);
  });
});

/* ── Hint ── */
controls.addEventListener('start', () => hintEl.classList.add('fade'));

/* ── Resize ── */
window.addEventListener('resize', () => {
  const rw = container.clientWidth, rh = container.clientHeight;
  camera.aspect = rw / rh; camera.updateProjectionMatrix();
  renderer.setSize(rw, rh);
});

/* ═══════════════════════════════════════════════════
   Upload & STL loading
   ═══════════════════════════════════════════════════ */

const API = window.DAIYUJIN_API_BASE || 'http://127.0.0.1:5000';

function showLoading() { loadingEl.classList.add('show'); btnUpload.disabled = true; fileInput.disabled = true; }
function hideLoading() { loadingEl.classList.remove('show'); btnUpload.disabled = false; fileInput.disabled = false; }

async function uploadAndPreview(file) {
  showLoading();
  infoEl.textContent = 'Uploading...';
  try {
    const form = new FormData();
    form.append('file', file);

    /* Step 1: upload to get STL conversion */
    const resp = await fetch(`${API}/api/public/quote/upload`, { method: 'POST', body: form });
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || 'Upload failed');

    const fileId = data.file_id;
    const name = data.data?.name || file.name.replace(/\.(stp|step)$/i, '');

    /* Step 2: request STL export */
    const stlResp = await fetch(`${API}/api/public/quote/model/${fileId}`);
    if (!stlResp.ok) throw new Error('STL conversion failed');

    const arrayBuf = await stlResp.arrayBuffer();

    /* Step 3: load STL into viewer */
    const loader = new STLLoader();
    const geometry = loader.parse(arrayBuf);
    geometry.computeVertexNormals();
    geometry.center();

    modelGroup.clear();
    const mesh = new THREE.Mesh(geometry, modelMaterial);
    mesh.castShadow = true; mesh.receiveShadow = true;
    modelGroup.add(mesh);

    updateViews();
    const v = views.iso;
    camera.position.set(v.pos[0], v.pos[1], v.pos[2]);
    controls.target.set(v.target[0], v.target[1], v.target[2]);
    controls.update();

    dropZone.classList.add('hidden');
    hintEl.classList.remove('fade');
    setTimeout(() => hintEl.classList.add('fade'), 6000);

    const tris = geometry.index ? geometry.index.count / 3 : geometry.attributes.position.count / 3;
    infoEl.innerHTML = `${Math.round(tris).toLocaleString()} faces<br>${name}`;

  } catch (err) {
    infoEl.textContent = `Error: ${err.message}`;
    console.error(err);
  }
  hideLoading();
}

/* Upload button */
btnUpload.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (file) uploadAndPreview(file);
});

/* Drag & drop */
container.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.opacity = '1'; });
container.addEventListener('dragleave', () => { dropZone.style.opacity = ''; });
container.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.opacity = '';
  const file = e.dataTransfer.files[0];
  if (file && /\.(stp|step)$/i.test(file.name)) uploadAndPreview(file);
});

/* ── Render loop ── */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
