<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大余金管理后台 - {% block title %}控制台{% endblock %}</title>
    <link rel="stylesheet" href="/admin/static/admin.css">
    {% block head %}{% endblock %}
</head>
<body>
{% if session.admin_user %}
<nav class="admin-nav">
    <span class="admin-nav-brand">大余金管理后台</span>
    <div class="admin-nav-links">
        <a href="/admin/dashboard" {% if request.path == '/admin/dashboard' %}class="active"{% endif %}>仪表盘</a>
        <a href="#" data-nav="inquiries" {% if request.path == '/admin/inquiries' %}class="active"{% endif %}>询盘记录</a>
        <a href="#" data-nav="settings" {% if request.path == '/admin/settings' %}class="active"{% endif %}>系统设置</a>
        <a href="#" data-nav="system" {% if request.path == '/admin/system' %}class="active"{% endif %}>系统状态</a>
        <a href="#" data-nav="audit" {% if request.path == '/admin/audit' %}class="active"{% endif %}>操作日志</a>
        <span style="margin-left:auto;color:#94a3b8;font-size:13px;">{{ session.admin_user }}</span>
        <a href="#" data-nav="account">账户</a>
        <a href="/admin/logout">退出登录</a>
    </div>
</nav>
{% endif %}

<main class="admin-main">
    {% block content %}{% endblock %}
</main>

<div id="admin-toast" class="admin-toast" hidden></div>
<script src="/admin/static/admin.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
